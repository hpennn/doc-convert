    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist/build/pdf.worker.min.js';

        const chatMessages = document.getElementById('chatMessages');
        const chatArea = document.getElementById('chatArea');
        const fileInput = document.getElementById('fileInput');
        const inputZone = document.getElementById('inputZone');
        const dropOverlay = document.getElementById('dropOverlay');

        // ===== Chat Helpers =====
        function scrollBottom() { chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' }); }

        function addBotMessage(html, opts) {
            const div = document.createElement('div');
            div.className = 'flex items-start gap-3 msg-in';
            div.innerHTML = `
                <div class="shrink-0 w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center mt-0.5">
                    <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
                </div>
                <div class="bg-white rounded-2xl rounded-tl-sm shadow-sm border border-gray-200 px-4 py-3 max-w-[85%] text-sm text-gray-700 leading-relaxed">${html}</div>`;
            chatMessages.appendChild(div);
            scrollBottom();
            return div;
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'flex items-start gap-3 justify-end msg-in';
            div.innerHTML = `
                <div class="bg-blue-500 text-white rounded-2xl rounded-tr-sm shadow-sm border border-blue-400/30 px-4 py-3 max-w-[85%] text-sm leading-relaxed">${text}</div>
                <div class="shrink-0 w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center mt-0.5">
                    <svg class="w-4 h-4 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>`;
            chatMessages.appendChild(div);
            scrollBottom();
        }

        function addTyping() {
            const div = document.createElement('div');
            div.id = 'typingIndicator';
            div.className = 'flex items-start gap-3 msg-in';
            div.innerHTML = `
                <div class="shrink-0 w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center mt-0.5">
                    <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
                </div>
                <div class="bg-white rounded-2xl rounded-tl-sm shadow-sm border border-gray-200 px-4 py-3">
                    <div class="dot-typing"><span></span><span></span><span></span></div>
                </div>`;
            chatMessages.appendChild(div);
            scrollBottom();
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        // ===== Welcome =====
        addBotMessage(`你好！我是文档转换助手 📄<br><br>上传文件，我来帮你转换：<br>• <strong>图片</strong> → PDF（支持 JPG/PNG，可多选）<br>• <strong>PDF</strong> → 图片（每页生成 PNG）<br><br><span class="text-gray-400 text-xs">所有处理在浏览器本地完成，文件不会上传到任何服务器。</span>`);

        // ===== File Input Events =====
        inputZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFiles(Array.from(e.target.files));
            e.target.value = '';
        });

        // Global drag & drop
        let dragCounter = 0;
        document.addEventListener('dragenter', (e) => { e.preventDefault(); dragCounter++; dropOverlay.classList.add('active'); });
        document.addEventListener('dragleave', (e) => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dropOverlay.classList.remove('active'); } });
        document.addEventListener('dragover', (e) => e.preventDefault());
        document.addEventListener('drop', (e) => {
            e.preventDefault(); dragCounter = 0; dropOverlay.classList.remove('active');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/') || f.type === 'application/pdf');
            if (files.length) handleFiles(files);
        });

        // ===== Handle Files =====
        async function handleFiles(files) {
            const images = files.filter(f => f.type.startsWith('image/'));
            const pdfs = files.filter(f => f.type === 'application/pdf');

            if (images.length > 0) {
                const totalSize = images.reduce((s, f) => s + f.size, 0);
                const nameList = images.length === 1 ? images[0].name : images.map(f => f.name).join(', ');
                addUserMessage(`📎 ${images.length} 张图片 (${formatSize(totalSize)})<br><span class="text-xs opacity-70">${nameList}</span>`);
                addTyping();
                await new Promise(r => setTimeout(r, 600));
                await convertImagesToPdf(images);
            }

            if (pdfs.length > 0) {
                for (const pdf of pdfs) {
                    addUserMessage(`📎 ${pdf.name} (${formatSize(pdf.size)})`);
                    addTyping();
                    await new Promise(r => setTimeout(r, 600));
                    await convertPdfToImages(pdf);
                }
            }

            if (images.length === 0 && pdfs.length === 0) {
                addUserMessage(`📎 ${files.length} 个文件`);
                addBotMessage('抱歉，我只能处理 <strong>图片（JPG/PNG）</strong> 和 <strong>PDF</strong> 文件，请重新上传 😊');
            }
        }

        // ===== Image → PDF =====
        async function convertImagesToPdf(images) {
            try {
                const { PDFDocument } = PDFLib;
                const pdfDoc = await PDFDocument.create();

                for (const file of images) {
                    let imgBytes = await file.arrayBuffer();
                    let img;
                    try {
                        if (file.type === 'image/jpeg') img = await pdfDoc.embedJpg(imgBytes);
                        else img = await pdfDoc.embedPng(imgBytes);
                    } catch {
                        const bitmap = await createImageBitmap(await file.arrayBuffer());
                        const canvas = document.createElement('canvas');
                        canvas.width = bitmap.width; canvas.height = bitmap.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(bitmap, 0, 0);
                        imgBytes = await canvas.convertToBlob({ type: 'image/png' }).then(b => b.arrayBuffer());
                        img = await pdfDoc.embedPng(imgBytes);
                    }
                    const page = pdfDoc.addPage([img.width, img.height]);
                    page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
                }

                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);

                removeTyping();
                addBotMessage(`✅ 转换完成！已将 ${images.length} 张图片合并为 PDF<br><br><a href="${url}" download="converted.pdf" class="inline-flex items-center gap-2 bg-blue-500 hover:bg-blue-600 text-white px-5 py-2.5 rounded-xl font-medium text-sm transition-colors no-underline"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>下载 PDF (${formatSize(blob.size)})</a><br><br><span class="text-gray-400 text-xs">可继续上传新文件</span>`);
            } catch (err) {
                removeTyping();
                addBotMessage(`❌ 转换失败：${err.message || '未知错误'}<br>请检查图片文件是否损坏后重试。`);
            }
        }

        // ===== PDF → Images =====
        async function convertPdfToImages(file) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const total = pdfDoc.numPages;
                const imageDataUrls = [];
                const imageBlobs = [];

                for (let i = 1; i <= total; i++) {
                    const page = await pdfDoc.getPage(i);
                    const viewport = page.getViewport({ scale: 2 });
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = viewport.width; canvas.height = viewport.height;
                    await page.render({ canvasContext: ctx, viewport }).promise;
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                    const dataUrl = canvas.toDataURL('image/png');
                    imageDataUrls.push(dataUrl);
                    imageBlobs.push({ blob, pageNum: i });
                }

                removeTyping();

                let previewHtml = `<div class="preview-grid">`;
                imageBlobs.forEach((item, idx) => {
                    previewHtml += `<div class="relative group"><img src="${imageDataUrls[idx]}" class="preview-img w-full object-contain" alt="Page ${item.pageNum}"><a href="${imageDataUrls[idx]}" download="page_${item.pageNum}.png" class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity rounded-lg flex items-center justify-center"><svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></a><p class="text-xs text-gray-400 text-center mt-1">第 ${item.pageNum} 页</p></div>`;
                });
                previewHtml += '</div>';

                // Create ZIP-like download (individual)
                let downloadLinks = '';
                if (imageBlobs.length > 1) {
                    downloadLinks = imageBlobs.map((item, idx) => `<a href="${imageDataUrls[idx]}" download="page_${item.pageNum}.png" class="text-blue-500 hover:text-blue-700 text-xs">page_${item.pageNum}.png</a>`).join(' · ');
                }

                addBotMessage(`✅ <strong>${file.name}</strong> 已转换为 ${total} 张图片<br>${previewHtml}<br><div class="flex flex-wrap items-center gap-2 mt-2">${imageBlobs.length === 1 ? `<a href="${imageDataUrls[0]}" download="page_${imageBlobs[0].pageNum}.png" class="inline-flex items-center gap-2 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-xl font-medium text-sm transition-colors no-underline"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>下载图片</a>` : `<button onclick="downloadAllImages(this)" data-urls='${JSON.stringify(imageDataUrls.map((u, i) => ({url: u, name: `page_${imageBlobs[i].pageNum}.png`})))}' class="inline-flex items-center gap-2 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-xl font-medium text-sm transition-colors"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>下载全部 ${total} 张</button>`}</div><br><span class="text-gray-400 text-xs">可继续上传新文件</span>`);
            } catch (err) {
                removeTyping();
                addBotMessage(`❌ 转换失败：${err.message || '无法读取此 PDF 文件'}<br>请确认文件未损坏后重试。`);
            }
        }

        // Download all images sequentially
        async function downloadAllImages(btn) {
            const items = JSON.parse(btn.dataset.urls);
            btn.disabled = true;
            btn.innerHTML = '<svg class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.48-8.48l2.83-2.83M2 12h4m12 0h4m-3.93 7.07l-2.83-2.83M6.34 6.34L3.51 3.51"/></svg> 下载中...';
            for (const item of items) {
                const a = document.createElement('a');
                a.href = item.url; a.download = item.name;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                await new Promise(r => setTimeout(r, 300));
            }
            btn.innerHTML = '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20,6 9,17 4,12"/></svg> 下载完成';
        }
    </script>
