    <script>
        // Initialize PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist/build/pdf.worker.min.js';

        // ==================== Tab Switching ====================
        function switchTab(tab) {
            document.querySelectorAll('.tab-section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.remove('tab-active'));
            
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        }

        // ==================== 图片转PDF ====================
        let imageFiles = [];
        const dropZoneImg = document.getElementById('drop-zone-img');
        const imgInput = document.getElementById('img-input');

        // Drop zone events
        dropZoneImg.addEventListener('click', () => imgInput.click());
        dropZoneImg.addEventListener('dragover', (e) => { e.preventDefault(); dropZoneImg.classList.add('dragover'); });
        dropZoneImg.addEventListener('dragleave', () => dropZoneImg.classList.remove('dragover'));
        dropZoneImg.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZoneImg.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            if (files.length) addImages(files);
        });
        imgInput.addEventListener('change', (e) => {
            if (e.target.files.length) addImages(Array.from(e.target.files));
            e.target.value = '';
        });

        function addImages(files) {
            imageFiles = imageFiles.concat(files);
            renderImageList();
        }

        function renderImageList() {
            const list = document.getElementById('img-list');
            const fileList = document.getElementById('img-file-list');
            const count = document.getElementById('img-count');

            if (imageFiles.length === 0) {
                fileList.classList.add('hidden');
                return;
            }

            fileList.classList.remove('hidden');
            count.textContent = imageFiles.length;
            list.innerHTML = '';

            imageFiles.forEach((file, idx) => {
                const url = URL.createObjectURL(file);
                const item = document.createElement('div');
                item.className = 'file-item flex items-center gap-3 bg-gray-50 rounded-lg p-2 pr-3 border border-gray-100';
                item.draggable = true;
                item.dataset.index = idx;
                item.innerHTML = `
                    <img src="${url}" class="w-12 h-12 object-cover rounded" alt="">
                    <div class="flex-1 min-w-0">
                        <p class="text-sm text-gray-700 truncate">${file.name}</p>
                        <p class="text-xs text-gray-400">${(file.size / 1024).toFixed(1)} KB</p>
                    </div>
                    <div class="flex items-center gap-1">
                        ${idx > 0 ? `<button onclick="moveImage(${idx}, -1)" class="p-1 text-gray-400 hover:text-blue-500" title="上移">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18,15 12,9 6,15"/></svg>
                        </button>` : ''}
                        ${idx < imageFiles.length - 1 ? `<button onclick="moveImage(${idx}, 1)" class="p-1 text-gray-400 hover:text-blue-500" title="下移">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,9 12,15 18,9"/></svg>
                        </button>` : ''}
                        <button onclick="removeImage(${idx})" class="p-1 text-gray-400 hover:text-red-500" title="移除">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function moveImage(idx, dir) {
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= imageFiles.length) return;
            [imageFiles[idx], imageFiles[newIdx]] = [imageFiles[newIdx], imageFiles[idx]];
            renderImageList();
        }

        function removeImage(idx) {
            imageFiles.splice(idx, 1);
            renderImageList();
        }

        function clearImages() {
            imageFiles = [];
            renderImageList();
        }

        async function convertToPdf() {
            if (imageFiles.length === 0) return;

            const btn = document.getElementById('btn-convert-pdf');
            const progress = document.getElementById('img-progress');
            const progressBar = document.getElementById('img-progress-bar');
            const progressText = document.getElementById('img-progress-text');

            btn.disabled = true;
            progress.classList.remove('hidden');
            progressBar.style.width = '0%';
            progressText.textContent = '正在转换...';

            try {
                const { PDFDocument } = PDFLib;
                const pdfDoc = await PDFDocument.create();
                const total = imageFiles.length;

                for (let i = 0; i < total; i++) {
                    progressText.textContent = `正在处理第 ${i + 1}/${total} 张图片...`;
                    progressBar.style.width = `${((i) / total) * 100}%`;

                    const file = imageFiles[i];
                    let imgBytes = await file.arrayBuffer();
                    let img;

                    try {
                        if (file.type === 'image/jpeg') {
                            img = await pdfDoc.embedJpg(imgBytes);
                        } else {
                            // Convert to PNG if needed
                            img = await pdfDoc.embedPng(imgBytes);
                        }
                    } catch (e) {
                        // Try converting via canvas for unsupported formats
                        const bitmap = await createImageBitmap(await file.arrayBuffer());
                        const canvas = document.createElement('canvas');
                        canvas.width = bitmap.width;
                        canvas.height = bitmap.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(bitmap, 0, 0);
                        imgBytes = await canvas.convertToBlob({ type: 'image/png' }).then(b => b.arrayBuffer());
                        img = await pdfDoc.embedPng(imgBytes);
                    }

                    const page = pdfDoc.addPage([img.width, img.height]);
                    page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
                }

                progressText.textContent = '正在生成 PDF...';
                progressBar.style.width = '90%';

                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'converted.pdf';
                a.click();
                URL.revokeObjectURL(url);

                progressBar.style.width = '100%';
                progressText.textContent = '转换完成！';

                setTimeout(() => {
                    progress.classList.add('hidden');
                    progressBar.style.width = '0%';
                }, 3000);
            } catch (err) {
                console.error('Conversion error:', err);
                progressText.textContent = '转换失败：' + (err.message || '未知错误');
                progressBar.style.width = '0%';
            } finally {
                btn.disabled = false;
            }
        }

        // ==================== PDF转图片 ====================
        let pdfFile = null;
        let pdfDoc = null;
        const dropZonePdf = document.getElementById('drop-zone-pdf');
        const pdfInput = document.getElementById('pdf-input');

        // Drop zone events
        dropZonePdf.addEventListener('click', () => pdfInput.click());
        dropZonePdf.addEventListener('dragover', (e) => { e.preventDefault(); dropZonePdf.classList.add('dragover'); });
        dropZonePdf.addEventListener('dragleave', () => dropZonePdf.classList.remove('dragover'));
        dropZonePdf.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZonePdf.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
            if (files.length) loadPdf(files[0]);
        });
        pdfInput.addEventListener('change', (e) => {
            if (e.target.files.length) loadPdf(e.target.files[0]);
            e.target.value = '';
        });

        // Page range radio
        document.querySelectorAll('input[name="page-range"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                document.getElementById('custom-range').classList.toggle('hidden', e.target.value !== 'custom');
            });
        });

        async function loadPdf(file) {
            pdfFile = file;
            const arrayBuffer = await file.arrayBuffer();
            
            try {
                pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                document.getElementById('pdf-name').textContent = file.name;
                document.getElementById('pdf-pages').textContent = `共 ${pdfDoc.numPages} 页`;
                document.getElementById('pdf-info').classList.remove('hidden');
            } catch (err) {
                alert('无法读取此 PDF 文件，请确认文件未损坏。');
                console.error(err);
            }
        }

        function clearPdf() {
            pdfFile = null;
            pdfDoc = null;
            document.getElementById('pdf-info').classList.add('hidden');
        }

        function parsePageRange(rangeStr, totalPages) {
            const pages = new Set();
            const parts = rangeStr.split(',').map(s => s.trim()).filter(Boolean);
            
            for (const part of parts) {
                if (part.includes('-')) {
                    const [start, end] = part.split('-').map(Number);
                    if (!isNaN(start) && !isNaN(end)) {
                        for (let i = Math.max(1, start); i <= Math.min(totalPages, end); i++) {
                            pages.add(i);
                        }
                    }
                } else {
                    const num = parseInt(part);
                    if (!isNaN(num) && num >= 1 && num <= totalPages) {
                        pages.add(num);
                    }
                }
            }
            
            return Array.from(pages).sort((a, b) => a - b);
        }

        async function convertPdfToImages() {
            if (!pdfDoc) return;

            const btn = document.getElementById('btn-convert-img');
            const progress = document.getElementById('pdf-progress');
            const progressBar = document.getElementById('pdf-progress-bar');
            const progressText = document.getElementById('pdf-progress-text');

            btn.disabled = true;
            progress.classList.remove('hidden');
            progressBar.style.width = '0%';

            try {
                const rangeType = document.querySelector('input[name="page-range"]:checked').value;
                let pagesToConvert;

                if (rangeType === 'all') {
                    pagesToConvert = Array.from({ length: pdfDoc.numPages }, (_, i) => i + 1);
                } else {
                    const rangeStr = document.getElementById('page-range-input').value;
                    pagesToConvert = parsePageRange(rangeStr, pdfDoc.numPages);
                    if (pagesToConvert.length === 0) {
                        alert('请输入有效的页码范围');
                        btn.disabled = false;
                        progress.classList.add('hidden');
                        return;
                    }
                }

                const total = pagesToConvert.length;
                const imageBlobs = [];

                for (let idx = 0; idx < total; idx++) {
                    const pageNum = pagesToConvert[idx];
                    progressText.textContent = `正在转换第 ${pageNum} 页 (${idx + 1}/${total})...`;
                    progressBar.style.width = `${((idx) / total) * 100}%`;

                    const page = await pdfDoc.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 2 });
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    
                    await page.render({ canvasContext: ctx, viewport }).promise;
                    
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                    imageBlobs.push({ blob, pageNum });
                }

                progressText.textContent = '正在准备下载...';
                progressBar.style.width = '90%';

                // Download each image
                if (imageBlobs.length === 1) {
                    // Single image - direct download
                    const url = URL.createObjectURL(imageBlobs[0].blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `page_${imageBlobs[0].pageNum}.png`;
                    a.click();
                    URL.revokeObjectURL(url);
                } else {
                    // Multiple images - download sequentially with small delay
                    for (const { blob, pageNum } of imageBlobs) {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `page_${pageNum}.png`;
                        a.click();
                        URL.revokeObjectURL(url);
                        await new Promise(r => setTimeout(r, 300));
                    }
                }

                progressBar.style.width = '100%';
                progressText.textContent = `转换完成！共生成 ${total} 张图片`;

                setTimeout(() => {
                    progress.classList.add('hidden');
                    progressBar.style.width = '0%';
                }, 3000);
            } catch (err) {
                console.error('Conversion error:', err);
                progressText.textContent = '转换失败：' + (err.message || '未知错误');
                progressBar.style.width = '0%';
            } finally {
                btn.disabled = false;
            }
        }
    </script>
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
    </script>
</body>
